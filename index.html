<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloudflare Trace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <header>
      <h1>Cloudflare Trace</h1>
      <nav class="tabs">
        <button class="tab active" data-tab="trace">Trace</button>
        <button class="tab" data-tab="urls">URLs</button>
      </nav>
      <button id="theme-toggle" type="button">Theme: System</button>
    </header>

    <div id="tab-trace" class="tab-panel">
      <div class="tab-toolbar">
        <button id="refresh" type="button">Refresh</button>
      </div>
      <div id="output"></div>
    </div>

    <div id="tab-urls" class="tab-panel hidden">
      <div class="tab-toolbar">
        <button id="fetch-all" type="button">Fetch All</button>
        <button id="reset-urls" type="button">Reset to defaults</button>
      </div>
      <div id="url-list"></div>
      <div class="add-url-row">
        <input id="url-input" type="text" placeholder="example.com">
        <button id="add-url" type="button">Add</button>
      </div>
    </div>

    <footer>Data from <a href="https://one.one.one.one/cdn-cgi/trace" style="color:var(--accent)">one.one.one.one/cdn-cgi/trace</a></footer>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function(e) {
        console.warn('SW registration failed:', e);
      });
    }
  </script>
  <script src="app.js"></script>
</body>
</html>
